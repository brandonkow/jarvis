services:
  - type: web
    name: estatelab-jarvis
    runtime: node
    plan: starter
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: ESTATELAB_DATA_DIR
        value: /var/data
      - key: ESTATELAB_RAG_PATH
        value: ./rag/corpus.json
      - key: ESTATELAB_OWNER_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: ESTATELAB_AUTH_SESSION_DAYS
        value: 30
    disk:
      name: estatelab-data
      mountPath: /var/data
      sizeGB: 1
