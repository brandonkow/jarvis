services:
  - type: web
    name: apex-analytic
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: ESTATELAB_DATA_DIR
        value: ./data
      - key: ESTATELAB_RAG_PATH
        value: ./rag/corpus.json
      - key: ESTATELAB_OBJECT_DIR
        value: ./data/objects
      - key: ESTATELAB_OWNER_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_FREE_ROUTING
        value: true
      - key: LLM_MODEL
        sync: false
      - key: OPENAI_SERVICES_API_KEY
        sync: false
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: OPENAI_TRANSCRIPTION_MODEL
        value: gpt-4o-mini-transcribe
      - key: OPENAI_SPEECH_MODEL
        value: gpt-4o-mini-tts
      - key: OPENAI_SPEECH_VOICE
        value: marin
      - key: ESTATELAB_AUTH_SESSION_DAYS
        value: 30
      - key: ESTATELAB_REQUIRE_EMAIL_VERIFICATION
        value: false
      - key: ESTATELAB_EMAIL_WEBHOOK_URL
        sync: false
      - key: ESTATELAB_EMAIL_WEBHOOK_SECRET
        sync: false
      - key: ESTATELAB_AUTH_DEBUG_TOKENS
        value: false
      - key: APEX_BILLING_ENFORCEMENT
        value: false
      - key: APEX_BILLING_WEBHOOK_SECRET
        sync: false
      - key: APEX_PRO_CHECKOUT_URL
        sync: false
      - key: APEX_ADVISOR_CHECKOUT_URL
        sync: false
      - key: APEX_PRO_PRICE_RM
        value: 59
      - key: APEX_ADVISOR_PRICE_RM
        value: 199
      - key: DATABASE_URL
        sync: false
      - key: ESTATELAB_PG_POOL_MAX
        value: 5
